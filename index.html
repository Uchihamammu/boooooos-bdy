<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, booo! ❤️</title>
    <style>
        body {
            background-color: #ffe6e6; /* Soft pink background */
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* The Gift Box */
        #gift-box {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
            animation: bounce 2s infinite;
            z-index: 10;
        }

        #gift-box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* The Surprise Inside (Hidden at first) */
        #surprise {
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            z-index: 10;
        }

        /* Reveal Animation */
        .show-surprise {
            display: flex !important;
            animation: fadeIn 1.5s forwards;
        }

        h1 { color: #ff4d4d; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; font-size: 18px; }
        
        img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin: 15px 0;
            border: 3px solid #ff4d4d;
        }

        .cake { font-size: 60px; margin: 10px 0; }

        /* Falling Roses Animation */
        .falling-item {
            position: absolute;
            top: -10%;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- The Gift Box she clicks -->
    <div id="gift-box" onclick="openGift()">
        🎁<br>
        <span style="font-size: 20px; color: #ff4d4d; font-weight: bold;">Tap to open!</span>
    </div>

    <!-- The Surprise that appears -->
    <div id="surprise">
        <h1>Happy Birthday, Bhumika! ❤️</h1>
        
        <div class="cake">🎂</div>
        
        <!-- MAKE SURE YOUR PHOTO IS NAMED EXACTLY photo.jpg -->
        <img src="photo.jpg" alt="Us">
        
        <!-- LOVE WORDS -->
        <p>
            To my beautiful booo,<br><br>
            You mean the absolute world to me. I hope your special day is as beautiful, 
            amazing, and pure as you are. I love you more than words can say!
        </p>
    </div>

    <!-- MAKE SURE YOUR AUDIO IS NAMED EXACTLY song.mp3 -->
    <audio id="bday-song" src="song.mp3"></audio>

    <script>
        function createFallingItem() {
            const item = document.createElement('div');
            
            // Array of items (Red roses and white hearts for purity)
            const elements = ['🌹', '🤍', '🥀', '✨'];
            item.innerText = elements[Math.floor(Math.random() * elements.length)];
            
            item.classList.add('falling-item');
            
            // Randomize starting position, falling speed, and size
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = Math.random() * 3 + 3 + 's'; // Falls between 3s and 6s
            item.style.fontSize = Math.random() * 15 + 20 + 'px'; // Size between 20px and 35px
            
            document.body.appendChild(item);
            
            // Remove the item after it falls off screen so the browser doesn't crash
            setTimeout(() => {
                item.remove();
            }, 6000);
        }

        function openGift() {
            // Hide the gift box
            document.getElementById('gift-box').style.display = 'none';
            
            // Show the surprise
            document.getElementById('surprise').classList.add('show-surprise');
            
            // Play the music
            var audio = document.getElementById('bday-song');
            audio.play();
            
            // Start the falling roses effect (generates a new one every 300 milliseconds)
            setInterval(createFallingItem, 300);
        }
    </script>
</body>
</html>
