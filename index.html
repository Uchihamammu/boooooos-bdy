<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday, booo! ❤️</title>
    <style>
        body {
            background-color: #ffe6e6; 
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* The Gift Box */
        #gift-box {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
            animation: bounce 2s infinite;
            z-index: 10;
            /* Prevents blue highlight when tapping on mobile */
            -webkit-tap-highlight-color: transparent; 
        }

        #gift-box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* The Surprise Inside (Mobile Friendly Width) */
        #surprise {
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            padding: 25px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            width: 85%; /* Scales down for phones */
            max-width: 400px; /* Won't get too wide on iPads/desktops */
            z-index: 10;
            box-sizing: border-box;
        }

        /* Reveal Animation */
        .show-surprise {
            display: flex !important;
            animation: fadeIn 1.5s forwards;
        }

        h1 { 
            color: #ff4d4d; 
            margin-bottom: 10px; 
            font-size: 28px; /* Adjusted for smaller screens */
        }
        
        p { 
            color: #555; 
            line-height: 1.6; 
            font-size: 16px; /* Slightly smaller for mobile readability */
            margin: 0;
        }
        
        /* Responsive Image */
        img {
            width: 100%; 
            max-width: 250px; 
            height: auto; 
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            border-radius: 15px;
            margin: 15px 0;
            border: 3px solid #ff4d4d;
        }

        .cake { font-size: 50px; margin: 10px 0; }

        /* Falling Roses Animation */
        .falling-item {
            position: absolute;
            top: -10%;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Small screen adjustments */
        @media (max-width: 350px) {
            h1 { font-size: 24px; }
            #gift-box { font-size: 80px; }
        }
    </style>
</head>
<body>

    <!-- The Gift Box she clicks -->
    <div id="gift-box" onclick="openGift()">
        🎁<br>
        <span style="font-size: 20px; color: #ff4d4d; font-weight: bold;">Tap to open!</span>
    </div>

    <!-- The Surprise that appears -->
    <div id="surprise">
        <h1>Happy Birthday, Bhumika! ❤️</h1>
        
        <div class="cake">🎂</div>
        
        <!-- MAKE SURE YOUR PHOTO IS NAMED EXACTLY photo.jpg -->
        <img src="photo.jpg" alt="Us">
        
        <!-- LOVE WORDS -->
        <p>
            To my beautiful booo,<br><br>
            You mean the absolute world to me. I hope your special day is as beautiful, 
            amazing, and pure as you are. I love you more than words can say!
        </p>
    </div>

    <!-- MAKE SURE YOUR AUDIO IS NAMED EXACTLY song.mp3 -->
    <audio id="bday-song" src="song.mp3"></audio>

    <script>
        function createFallingItem() {
            const item = document.createElement('div');
            
            const elements = ['🌹', '🤍', '🥀', '✨'];
            item.innerText = elements[Math.floor(Math.random() * elements.length)];
            
            item.classList.add('falling-item');
            
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = Math.random() * 3 + 3 + 's'; 
            item.style.fontSize = Math.random() * 15 + 20 + 'px'; 
            
            document.body.appendChild(item);
            
            setTimeout(() => {
                item.remove();
            }, 6000);
        }

        function openGift() {
            document.getElementById('gift-box').style.display = 'none';
            document.getElementById('surprise').classList.add('show-surprise');
            
            var audio = document.getElementById('bday-song');
            audio.play();
            
            setInterval(createFallingItem, 300);
        }
    </script>
</body>
</html>
